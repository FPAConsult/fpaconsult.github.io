<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPA Consult — Expert BIM · MEP</title>
    <meta name="description" content="FPA Consult — L'expertise BIM, de la conception à l'exploitation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
 
        .container {
            text-align: center;
            padding: 2rem;
        }
 
        /* Logo wrapper for glow effect */
        .logo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 3.5rem;
        }
 
        /* Glow behind logo */
        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            animation: glowPulse 3s ease-in-out 1.8s infinite;
        }
 
        .logo {
            width: 260px;
            height: auto;
            position: relative;
            z-index: 1;
            opacity: 0;
            filter: brightness(0);
            animation: logoReveal 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s forwards;
        }
 
        /* Horizontal line that draws in */
        .line {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            margin: -1.5rem auto 3.5rem;
            animation: lineExpand 1s ease-out 1.8s forwards;
        }
 
        /* Buttons */
        .buttons {
            display: flex;
            gap: 2.5rem;
            justify-content: center;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 0.8s ease-out 2.2s forwards;
        }
 
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border: 1px solid rgba(255,255,255,0);
            border-radius: 50%;
            background: transparent;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            animation: btnBorderReveal 0.6s ease-out 2.8s forwards;
        }
 
        .btn:hover {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.06);
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255,255,255,0.06);
        }
 
        .btn:active { transform: scale(1); }
 
        /* === ANIMATIONS === */
 
        /* Logo: fades in from dark, scales up slightly, brightness goes from 0 to 1 */
        @keyframes logoReveal {
            0% {
                opacity: 0;
                filter: brightness(0);
                transform: scale(0.85);
            }
            40% {
                opacity: 1;
                filter: brightness(0);
                transform: scale(0.95);
            }
            70% {
                filter: brightness(1.5);
                transform: scale(1.02);
            }
            100% {
                opacity: 1;
                filter: brightness(1);
                transform: scale(1);
            }
        }
 
        /* Glow pulses subtly behind logo */
        @keyframes glowPulse {
            0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
 
        /* Line draws from center outward */
        @keyframes lineExpand {
            from { width: 0; }
            to { width: 120px; }
        }
 
        /* Buttons fade up */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
 
        /* Button borders appear */
        @keyframes btnBorderReveal {
            from { border-color: rgba(255,255,255,0); }
            to { border-color: rgba(255,255,255,0.15); }
        }
 
        /* Responsive */
        @media (max-width: 420px) {
            .logo { width: 200px; }
            .btn { width: 64px; height: 64px; font-size: 1rem; }
        }
    </style>
</head>
